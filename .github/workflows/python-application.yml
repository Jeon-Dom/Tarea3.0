name: python-application

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    # 1. Descargar el código fuente
    - name: Checkout de código
      uses: actions/checkout@v4

    # 2. Configurar entorno de Python
    - name: Configurar Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    # 3. Instalar dependencias
    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Ejecutar pruebas automatizadas
    - name: Ejecutar pruebas con pytest
      run: |
        pytest

    # 5. Ejecutar la aplicación
    - name: Ejecutar la aplicación
      run: |
        python app/main.py

    # 6. Simular una fase de despliegue
    - name: Simular fase de despliegue
      run: |
        echo "Iniciando simulación de despliegue..."
        echo "Verificando entornos y variables de entorno..."
        echo "¡Despliegue simulado con éxito en el entorno de Staging!"

    # 7. Autenticarse en GitHub Container Registry (GHCR)
    - name: Autenticarse en GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    # 8. Construir y Publicar la imagen Docker (Lowercased para evitar errores de nombres)
    - name: Construir y publicar imagen Docker
      run: |
        # Convertir el nombre de usuario a minúsculas porque Docker/GHCR no aceptan mayúsculas
        IMAGE_NAME=$(echo "ghcr.io/${{ github.repository }}/ejercicio" | tr '[:upper:]' '[:lower:]')
        
        echo "Construyendo la imagen: $IMAGE_NAME:3.0.0"
        docker build -t $IMAGE_NAME:3.0.0 .
        
        echo "Publicando la imagen en GHCR..."
        docker push $IMAGE_NAME:3.0.0